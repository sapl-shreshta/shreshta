<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Telugu 🔤</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Comic Sans MS','Chalkboard SE','Trebuchet MS',sans-serif;}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#ffe0f0,#e0f7ff,#fff5d6);color:#1d2b53;padding:16px 12px;text-align:center;}
  .back{position:absolute;top:30px;left:30px;background:#a06cd5;color:white;text-decoration:none;
    padding:12px 24px;border-radius:50px;font-weight:bold;box-shadow:0 5px 0 #7b4aaf;}
  .big{font-size:clamp(80px,15vw,160px);animation:bounce 2s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
  h1{font-size:clamp(40px,6vw,72px);margin:20px 0;
    background:linear-gradient(90deg,#ffd166,#ff9e45,#ef476f,#a06cd5);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  p{font-size:clamp(20px,2.6vw,28px);color:#a06cd5;max-width:600px;margin-top:10px;}
  .badge{display:inline-block;background:#ffd166;color:#1d2b53;padding:16px 12px;border-radius:50px;
    font-weight:bold;margin-top:30px;border:3px solid #ff9e45;font-size:22px;}
</style>
</head>
<body>
  <a class="back" href="../index.html">⬅️ Home</a>
  <div class="big">🔤</div>
  <h1>తెలుగు · Telugu</h1>
  <p>పద్యాలు, కథలు, వ్యాకరణం — మన మాతృభాష నేర్చుకుందాం! 🌼</p>
  <div class="badge">🚧 Coming Soon 🚧</div>
</body>
</html>
