<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music 🎵</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Trebuchet MS', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe0f0, #e0f7ff, #fff5d6);
      color: #1d2b53;
      padding: 40px 20px;
      text-align: center;
    }

    .back {
      position: absolute;
      top: 30px;
      left: 30px;
      background: #a06cd5;
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 5px 0 #7b4aaf;
    }

    .big {
      font-size: clamp(40px, 5vw, 80px);
      animation: bounce 2s ease-in-out infinite;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    h1 {
      font-size: clamp(30px, 6vw, 42px);
      margin: 10px 0;
      background: linear-gradient(90deg, #ff8fa3, #ff6ec7, #a06cd5, #4cc9f0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      font-size: clamp(16px, 2.6vw, 16px);
      color: #a06cd5;
      max-width: 600px;
      margin-top: 10px;
      margin-bottom: 25px;
    }

    .badge {
      display: inline-block;
      background: #ffd166;
      color: #1d2b53;
      padding: 10px 24px;
      border-radius: 50px;
      font-weight: bold;
      margin-top: 30px;
      border: 4px solid #ff8fa3;
      font-size: 22px;
    }

    .content-container {
      margin-top: 50px;
      text-align: left;
      max-width: 700px;
      width: 100%;
    }

    .folder-section {
      margin: 30px 0;
      background: rgba(255, 255, 255, 0.8);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.3s ease;
    }

    .folder-section:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      background: rgba(255, 255, 255, 0.95);
    }

    .folder-title {
      font-size: 28px;
      color: #a06cd5;
      font-weight: bold;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .folder-icon {
      font-size: 32px;
    }

    .file-list {
      list-style: none;
      padding-left: 0;
    }

    .file-item {
      padding: 12px 15px;
      margin: 8px 0;
      background: linear-gradient(90deg, #ffe0f0, #fff5d6);
      border-left: 4px solid #ff8fa3;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      color: #1d2b53;
    }

    .file-icon {
      font-size: 20px;
    }

    .subject {
      background: #fff8f0;
      border-radius: 24px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      color: #1d2b53;
      border: 4px solid;
      box-shadow: 0 8px 0 rgba(0, 0, 0, .1), 0 16px 30px rgba(0, 0, 0, .08);
      transition: transform .2s ease, box-shadow .2s ease;
      display: block;
    }

    .subject:hover {
      transform: translateY(-6px) rotate(-1deg);
      box-shadow: 0 14px 0 rgba(0, 0, 0, .1), 0 22px 40px rgba(0, 0, 0, .15);
    }

    .subject:active {
      transform: translateY(2px);
    }

    .icon {
      font-size: clamp(50px, 7vw, 80px);
      display: block;
      margin-bottom: 10px;
    }

    .name {
      font-size: clamp(22px, 2.4vw, 28px);
      font-weight: bold;
    }

    .carnatic {
      border-color: #ef476f;
    }

    .keerthanas {
      border-color: #06d6a0;
    }
  </style>
</head>

<body>
  <a class="back" href="../index.html">⬅️ Home</a>
  <div class="big">🎵</div>
  <h1>Music</h1>
  <p>Ragas, songs, instruments & rhythm — let's make some beautiful sounds! 🎶</p>

  <div class="grid">
    <a class="subject carnatic" href="Carnatic/index.html"> <span class="icon">🎶</span><span
        class="name">Carnatic</span></a>
    <a class="subject keerthanas" href="Keerthanas/index.html"> <span class="icon">🎶</span><span
        class="name">Keerthanas</span></a>
  </div>
</body>

</html>
