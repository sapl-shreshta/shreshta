<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music 🎵</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Trebuchet MS', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ffe0f0, #e0f7ff, #fff5d6);
      color: #1d2b53;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .back {
      position: fixed;
      top: 30px;
      left: 30px;
      background: #a06cd5;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 5px 0 #7b4aaf;
      z-index: 100;
    }

    .back:hover {
      transform: translateY(-2px);
    }

    header {
      text-align: center;
      margin: 60px 0 40px 0;
    }

    .emoji {
      font-size: clamp(60px, 12vw, 120px);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    h1 {
      font-size: clamp(40px, 6vw, 72px);
      margin: 20px 0;
      background: linear-gradient(90deg, #ff8fa3, #ff6ec7, #a06cd5, #4cc9f0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: clamp(18px, 2.5vw, 24px);
      color: #4cc9f0;
      font-weight: bold;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin: 40px 0;
    }

    .music-card {
      background: #fff8f0;
      border-radius: 16px;
      padding: 16px 12px;
      border: 3px solid #ff8fa3;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
      text-decoration: none;
      color: inherit;
      transition: all .25s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .music-card:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 12px 24px rgba(0, 0, 0, .15);
    }

    .music-emoji {
      font-size: 36px;
      margin-bottom: 6px;
    }

    .music-card h2 {
      font-size: clamp(14px, 2.5vw, 18px);
      color: #ff8fa3;
      margin-bottom: 8px;
    }

    .music-card p {
      font-size: clamp(12px, 1.5vw, 14px);
      color: #1d2b53;
      line-height: 1.4;
    }

    footer {
      text-align: center;
      margin-top: 50px;
      font-size: 18px;
      color: #a06cd5;
    }
  </style>
</head>
<body>
  <a class="back" href="../index.html">⬅️ Home</a>
  <div class="container">
    <header>
      <div class="emoji">🎵</div>
      <h1>Music</h1>
      <p class="subtitle">Explore melodies, rhythms, and musical traditions! 🎶</p>
    </header>

    <div class="grid">
      <a href="Carnatic/index.html" class="music-card">
        <div class="music-emoji">🎼</div>
        <h2>Carnatic Music</h2>
        <p>Discover the rich traditions of South Indian classical music!</p>
      </a>
      <a href="Keerthanas/index.html" class="music-card">
        <div class="music-emoji">🎤</div>
        <h2>Keerthanas</h2>
        <p>Learn the beautiful devotional songs of classical music!</p>
      </a>
    </div>
  </div>

  <footer>Made with 💖 for Shreshta's learning adventure</footer>
</body>
</html>
