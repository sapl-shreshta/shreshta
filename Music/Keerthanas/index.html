<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keerthanas 🎵</title>
  <style>
    :root {
      --pink: #ff6ec7;
      --purple: #a06cd5;
      --blue: #4cc9f0;
      --teal: #06d6a0;
      --yellow: #ffd166;
      --orange: #ff9e45;
      --red: #ef476f;
      --cream: #fff8f0;
      --ink: #1d2b53;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Trebuchet MS', sans-serif;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(135deg, #fff5e6, #e6f3ff, #f0e6ff);
      color: var(--ink);
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Navigation buttons */
    .nav-top {
      position: fixed;
      top: 20px;
      display: flex;
      gap: 15px;
      z-index: 101;
    }

    .nav-back {
      left: 20px;
    }

    .nav-home {
      right: 20px;
    }

    .icon-btn {
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 0 #7a3b97;
      transition: transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .icon-btn:hover {
      transform: translateY(-2px);
    }

    .icon-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #7a3b97;
    }

    .header {
      text-align: center;
      margin: 60px 0 40px 0;
    }

    .big {
      font-size: clamp(80px, 15vw, 160px);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    h1 {
      font-size: clamp(36px, 6vw, 56px);
      color: var(--purple);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: clamp(18px, 2.5vw, 24px);
      color: var(--blue);
      font-weight: bold;
    }

    .song-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 25px;
      margin-top: 40px;
    }

    .song-card {
      background: var(--cream);
      border-radius: 15px;
      padding: 25px;
      border: 4px solid var(--purple);
      box-shadow: 0 8px 0 rgba(0, 0, 0, .08);
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .song-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 15px rgba(0, 0, 0, .15);
    }

    .song-icon {
      font-size: 48px;
      margin-bottom: 15px;
      display: block;
    }

    .song-title {
      font-size: 20px;
      font-weight: bold;
      color: var(--pink);
      margin-bottom: 10px;
    }

    .song-desc {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="nav-top nav-back">
    <a href="../index.html" style="text-decoration:none;">
      <button class="icon-btn" title="Back to Music">⬅️</button>
    </a>
  </div>

  <div class="nav-top nav-home">
    <a href="../../../index.html" style="text-decoration:none;">
      <button class="icon-btn" title="Go to Home">🏠</button>
    </a>
  </div>

  <div class="container">
    <div class="header">
      <div class="big">🎵</div>
      <h1>Keerthanas</h1>
      <p class="subtitle">Beautiful devotional songs & lyrics</p>
    </div>

    <div class="song-grid">
      <a href="rama-nama-tarakam.html" class="song-card">
        <span class="song-icon">🎵</span>
        <div class="song-title">Rama Nama Tarakam</div>
        <div class="song-desc">Devotional chant honoring Lord Rama</div>
      </a>
      <a href="gauri-nandana.html" class="song-card">
        <span class="song-icon">🎵</span>
        <div class="song-title">Gauri Nandana Gajavadana</div>
        <div class="song-desc">Ganesha song</div>
      </a>
    </div>
  </div>
</body>

</html>
