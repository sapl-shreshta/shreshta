<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Geometry Lessons 📐</title>
<style>
  :root{
    --pink:#ff6ec7;
    --purple:#a06cd5;
    --blue:#4cc9f0;
    --teal:#06d6a0;
    --yellow:#ffd166;
    --orange:#ff9e45;
    --red:#ef476f;
    --cream:#fff8f0;
    --ink:#1d2b53;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Comic Sans MS','Chalkboard SE','Trebuchet MS',sans-serif;}
  html,body{height:100%;overflow-x:hidden;}
  body{
    background:linear-gradient(135deg,#fff5e6,#e6f3ff,#f0e6ff);
    color:var(--ink);
    padding:20px;
  }

  .container{
    max-width:1000px;
    margin:0 auto;
  }

  /* Navigation buttons */
  .nav-top{
    position:fixed;top:20px;display:flex;gap:15px;z-index:101;
  }
  .nav-back{
    left:20px;
  }
  .nav-home{
    right:20px;
  }
  .icon-btn{
    background:var(--purple);color:white;border:none;
    border-radius:50%;width:50px;height:50px;
    font-size:24px;cursor:pointer;
    box-shadow:0 4px 0 #7a3b97;transition:transform .15s;
    display:flex;align-items:center;justify-content:center;
    font-weight:bold;
  }
  .icon-btn:hover{transform:translateY(-2px);}
  .icon-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #7a3b97;}

  header{
    text-align:center;
    margin:60px 0 40px 0;
  }

  h1{
    font-size:clamp(36px,6vw,56px);
    color:var(--purple);
    margin-bottom:10px;
  }

  .subtitle{
    font-size:clamp(18px,2.5vw,24px);
    color:var(--blue);
    font-weight:bold;
  }

  .emoji-row{
    font-size:clamp(40px,8vw,60px);
    text-align:center;
    margin:20px 0;
    letter-spacing:10px;
  }

  .lessons-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    margin:40px 0;
  }

  .lesson-card{
    background:var(--cream);
    border-radius:20px;
    padding:30px;
    border:4px solid var(--teal);
    box-shadow:0 8px 0 rgba(0,0,0,.08);
    text-decoration:none;
    color:inherit;
    transition:transform .2s,box-shadow .2s;
    cursor:pointer;
  }

  .lesson-card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 20px rgba(0,0,0,.15);
  }

  .lesson-emoji{
    font-size:50px;
    margin-bottom:15px;
  }

  .lesson-card h2{
    font-size:clamp(24px,4vw,32px);
    color:var(--pink);
    margin-bottom:10px;
  }

  .lesson-card p{
    font-size:clamp(16px,2vw,18px);
    color:var(--ink);
    line-height:1.5;
  }

  .highlight{
    background:linear-gradient(90deg,#ff6ec7,#ffd166,#06d6a0,#4cc9f0);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    font-weight:bold;
  }
</style>
</head>
<body>

<!-- Top Navigation -->
<div class="nav-top nav-back">
  <a href="../index.html" style="text-decoration:none;">
    <button class="icon-btn" title="Back to Maths">⬅️</button>
  </a>
</div>

<div class="nav-top nav-home">
  <a href="../../index.html" style="text-decoration:none;">
    <button class="icon-btn" title="Go to Home">🏠</button>
  </a>
</div>

<div class="container">
  <header>
    <div class="emoji-row">📐 📏 🎯</div>
    <h1><span class="highlight">Geometry</span> Lessons</h1>
    <p class="subtitle">Explore shapes, angles, and more! ✨</p>
  </header>

  <div class="lessons-grid">
    <a href="angles/index.html" class="lesson-card">
      <div class="lesson-emoji">📐</div>
      <h2>Angles</h2>
      <p>Learn about angles, how to measure them with a protractor, and explore different types of angles!</p>
    </a>
  </div>

</div>

</body>
</html>
